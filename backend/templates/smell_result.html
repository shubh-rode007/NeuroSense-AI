<!DOCTYPE html>
<html>
<head>
    <title>Smell Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>

<body>

<div class="navbar">
    <div class="logo">🧠 Smell Result</div>
    <a href="http://127.0.0.1:8000/dashboard.html" class="btn btn-outline">Dashboard</a>
</div>

<div class="center">

<div class="card" style="width:500px; text-align:center;">

<h2>Smell Analysis Result</h2>

<p class="result">Score: {{score}} / 20</p>
<p>Risk: {{risk}} %</p>

<h3>{{result}}</h3>

<p><b>Smell Level:</b> {{smell_level}}</p>
<p><b>Risk Category:</b> {{risk_level}}</p>

<hr>

<h3>Interpretation</h3>

<table style="width:100%; color:white;">
<tr><th>Score</th><th>Condition</th></tr>
<tr><td>0-5</td><td>Severe Loss</td></tr>
<tr><td>6-8</td><td>Moderate Loss</td></tr>
<tr><td>9-14</td><td>Mild Loss</td></tr>
<tr><td>15-20</td><td>Normal</td></tr>
</table>

<br>

<a href="/smell" class="btn btn-primary">🔁 Test Again</a>

<br><br>

<a href="http://127.0.0.1:8000/dashboard.html" class="btn btn-outline">
🏠 Dashboard
</a>

</div>

</div>

</body>
</html>
